# Production configuration for First Person Solana (Sour).
# Web-only: web clients connect over HTTP + WebSocket. No desktop UDP ingress.
server:
  assets:
    - "fs:./assets/dist/.index.source"
  presets:
    - name: "ffa-duel"
      virtual: true
      config:
        defaultMode: "ffa"
        defaultMap: "turbine"
        matchLength: 300
    - name: "insta-duel"
      virtual: true
      config:
        defaultMode: "insta"
        defaultMap: "turbine"
        matchLength: 300
    - name: "default"
      default: true
      config:
        defaultMode: "coop"
        defaultMap: "xmwhub"
    - name: "ffa"
      config:
        defaultMode: "ffa"
        defaultMap: "complex"
        matchLength: 300
        maps:
          - "turbine"
          - "complex"
          - "dust2"
    - name: "insta"
      config:
        defaultMode: "insta"
        defaultMap: "complex"
        matchLength: 300
        maps:
          - "turbine"
          - "complex"
          - "dust2"
    - name: "explore"
      config:
        matchLength: 180

  ingress:
    web:
      address: "0.0.0.0"
      port: 10000

  matchmaking:
    duel:
      - name: "ffa"
        preset: "ffa-duel"
        forceRespawn: "dead"
        default: true
      - name: "insta"
        preset: "insta-duel"
        forceRespawn: "dead"

  spaces:
    - preset: ffa
      config:
        alias: lobby
    - preset: insta
      config:
        alias: insta
